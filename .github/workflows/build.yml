name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install flet
          pip install flet-build
      - name: Build APK
        run: flet build apk --project StockAI-Pro
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-apk
          path: build/apk/app-release.apk
